<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 3.15: Interviewer Dashboard Layout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  canvas {
    display: block;
    border: 1px solid #ccc;
  }
  #printBtn {
    margin: 16px auto;
    display: block;
    padding: 10px 22px;
    font-size: 13px;
    font-family: Arial, sans-serif;
    background: #fff;
    border: 1.5px solid #555;
    border-radius: 4px;
    cursor: pointer;
    color: #222;
  }
  #printBtn:hover { background: #f0f0f0; }
  @media print {
    #printBtn { display: none !important; }
    body { padding: 0; }
    canvas { border: none; }
  }
</style>
</head>
<body>
<button id="printBtn" onclick="window.print()">📸 Print / Save as Image</button>
<canvas id="wf" width="1200" height="920"></canvas>
<script>
const canvas = document.getElementById('wf');
const ctx = canvas.getContext('2d');

// ── Helper Functions ──────────────────────────────────────────────────────────

function roundRect(x, y, w, h, r, fill, stroke, lw) {
  r = r || 0;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1; ctx.stroke(); }
}

function lbl(text, x, y, size, color, align, bold) {
  ctx.font = (bold ? 'bold ' : '') + size + 'px Arial';
  ctx.fillStyle = color || '#000';
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

function hline(x1, x2, y, color, lw) {
  ctx.beginPath();
  ctx.strokeStyle = color || '#CCC';
  ctx.lineWidth = lw || 1;
  ctx.moveTo(x1, y);
  ctx.lineTo(x2, y);
  ctx.stroke();
}

// ── 1. White Background ───────────────────────────────────────────────────────
ctx.fillStyle = '#FFF';
ctx.fillRect(0, 0, 1200, 920);

// ── 2. Figure Caption + Line ──────────────────────────────────────────────────
lbl('Figure 3.15: Interviewer Dashboard Layout', 600, 22, 14, '#000', 'center', true);
hline(10, 1190, 30, '#CCC', 1);

// ── 3. Browser Chrome ─────────────────────────────────────────────────────────
roundRect(10, 35, 1180, 875, 0, '#F0F0F0', '#888', 1);
ctx.fillStyle = '#DDD';
ctx.fillRect(10, 35, 1180, 28);
ctx.strokeStyle = '#888'; ctx.lineWidth = 1;
ctx.strokeRect(10, 35, 1180, 28);
[25, 42, 59].forEach(bx => {
  ctx.beginPath();
  ctx.arc(bx, 49, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#BBB'; ctx.fill();
  ctx.strokeStyle = '#999'; ctx.lineWidth = 0.5; ctx.stroke();
});
roundRect(80, 40, 700, 18, 3, '#FFF', '#AAA', 1);
lbl('http://localhost/rms/I_dashboard', 88, 49, 10, '#555', 'left', false);

// ── 4. Top Navigation Bar ─────────────────────────────────────────────────────
ctx.fillStyle = '#111';
ctx.fillRect(10, 63, 1180, 48);
roundRect(20, 75, 120, 24, 3, '#333', null, 0);
lbl('RMS', 80, 87, 14, '#FFF', 'center', true);
const navItems = [
  { text: 'Dashboard',    x: 200 },
  { text: 'My Schedule',  x: 295 },
  { text: 'Feedback',     x: 385 },
  { text: 'Question Bank',x: 470 },
  { text: 'Profile',      x: 570 },
];
navItems.forEach(n => lbl(n.text, n.x, 91, 11, '#FFF', 'left', false));
ctx.beginPath();
ctx.arc(1150, 87, 14, 0, Math.PI * 2);
ctx.fillStyle = '#555'; ctx.fill();
lbl('IV', 1150, 87, 10, '#FFF', 'center', true);

// ── 5. Left Sidebar ───────────────────────────────────────────────────────────
ctx.fillStyle = '#F8F8F8';
ctx.fillRect(10, 111, 180, 799);
ctx.beginPath();
ctx.strokeStyle = '#DDD'; ctx.lineWidth = 1;
ctx.moveTo(190, 111); ctx.lineTo(190, 910); ctx.stroke();

lbl('MAIN MENU', 25, 135, 9, '#888', 'left', false);

const menuItems = [
  { text: 'Dashboard',         y: 163, active: true  },
  { text: 'My Schedule',       y: 201, active: false },
  { text: 'Pending Feedback',  y: 237, active: false },
  { text: 'Completed Reviews', y: 273, active: false },
  { text: 'Question Bank',     y: 309, active: false },
  { text: 'Availability',      y: 345, active: false },
  { text: 'My Profile',        y: 381, active: false },
];

menuItems.forEach(item => {
  if (item.active) {
    ctx.fillStyle = '#EEE';
    ctx.fillRect(10, item.y - 18, 180, 36);
    ctx.fillStyle = '#000';
    ctx.fillRect(10, item.y - 18, 3, 36);
    lbl(item.text, 30, item.y, 12, '#111', 'left', true);
  } else {
    lbl(item.text, 30, item.y, 12, '#555', 'left', false);
  }
});

hline(15, 185, 420, '#DDD', 1);
lbl("TODAY'S SUMMARY", 25, 438, 9, '#888', 'left', false);
lbl('Interviews: 3',   30, 458, 11, '#333', 'left', false);
lbl('Feedback Due: 2', 30, 480, 11, '#888', 'left', false);
lbl('Completed: 1',    30, 502, 11, '#555', 'left', false);

// ── 6. Page Header ────────────────────────────────────────────────────────────
lbl('Interviewer Dashboard', 210, 145, 18, '#111', 'left', true);
lbl('Good Morning, Michael \u00B7 Friday, 24 April 2026', 210, 163, 11, '#777', 'left', false);
roundRect(1040, 130, 120, 26, 3, '#FFF', '#888', 1);
lbl('Set Availability', 1100, 143, 11, '#555', 'center', false);

// ── 7. Stat Cards ─────────────────────────────────────────────────────────────
const statCards = [
  { x: 200, title: "Today's Interviews", value: '3',   sub: 'Next: 10:00 AM' },
  { x: 440, title: 'Pending Feedback',   value: '2',   sub: 'Due by end of day' },
  { x: 680, title: 'This Week Total',    value: '8',   sub: '4 completed' },
  { x: 920, title: 'Avg Rating Given',   value: '4.1', sub: 'out of 5.0' },
];
statCards.forEach(c => {
  roundRect(c.x, 180, 228, 70, 6, '#F8F8F8', '#DDD', 1);
  lbl(c.title, c.x + 114, 197, 10, '#777', 'center', false);
  lbl(c.value,  c.x + 114, 222, 22, '#111', 'center', true);
  lbl(c.sub,    c.x + 114, 244, 10, '#555', 'center', false);
});

// ── 8. Today's Interview Schedule ─────────────────────────────────────────────
const schX = 200, schY = 268, schW = 980, schH = 220;
roundRect(schX, schY, schW, schH, 4, '#FFF', '#DDD', 1);
ctx.fillStyle = '#F5F5F5';
ctx.fillRect(schX + 1, schY + 1, schW - 2, 36);
lbl("Today's Interview Schedule", schX + 16, schY + 22, 12, '#333', 'left', true);
lbl('Friday, 24 April 2026', schX + schW - 16, schY + 22, 10, '#777', 'right', false);
hline(schX, schX + schW, schY + 36, '#DDD', 1);

// Slot definitions
const slots = [
  {
    dy: 46, fill: '#F8F8F8', stroke: '#CCC', accentFill: '#555',
    time: '10:00 AM \u2013 11:00 AM', name: 'Alex Johnson',
    role: 'Sr. Software Engineer \u00B7 Round 1',
    btnText: 'Start Interview', btnW: 110,
    badge: 'Upcoming', badgeColor: '#555',
  },
  {
    dy: 106, fill: '#F0F0F0', stroke: '#888', accentFill: '#333',
    time: '02:00 PM \u2013 03:00 PM', name: 'Maria Chen',
    role: 'UX Designer \u00B7 Round 2',
    btnText: 'View Details', btnW: 90,
    badge: 'Scheduled', badgeColor: '#555',
  },
  {
    dy: 166, fill: '#FFF', stroke: '#DDD', accentFill: '#AAA',
    time: '09:00 AM \u2013 09:45 AM', name: 'David Kim',
    role: 'Sales Manager \u00B7 Round 1',
    btnText: 'Give Feedback', btnW: 100,
    badge: 'Completed', badgeColor: '#888',
  },
];

slots.forEach(s => {
  const sx = schX + 10;
  const sy = schY + s.dy;
  const sw = schW - 20;
  const sh = 52;

  roundRect(sx, sy, sw, sh, 4, s.fill, s.stroke, 1);
  // Left accent bar
  ctx.fillStyle = s.accentFill;
  ctx.fillRect(sx, sy, 4, sh);

  const isCompleted = s.badge === 'Completed';
  const timeColor  = isCompleted ? '#555' : '#111';
  const nameColor  = isCompleted ? '#777' : '#333';
  const roleColor  = isCompleted ? '#AAA' : '#777';

  lbl(s.time, sx + 22, sy + 18, 11, timeColor, 'left', !isCompleted);
  lbl(s.name, sx + 22, sy + 34, 11, nameColor, 'left', false);
  lbl(s.role, sx + sw - 340, sy + 26, 10, roleColor, 'left', false);

  // Action button
  const btnX = sx + sw - s.btnW - 90;
  const btnY = sy + 14;
  roundRect(btnX, btnY, s.btnW, 24, 3, '#EEE', '#888', 1);
  lbl(s.btnText, btnX + s.btnW / 2, btnY + 12, 10, '#333', 'center', false);

  // Status badge
  const badgeW = 64;
  const badgeX = sx + sw - badgeW - 6;
  const badgeY = sy + 18;
  roundRect(badgeX, badgeY, badgeW, 18, 2, '#EEE', '#CCC', 1);
  lbl(s.badge, badgeX + badgeW / 2, badgeY + 9, 9, s.badgeColor, 'center', false);
});

// ── 9. Pending Feedback Panel ─────────────────────────────────────────────────
const pfX = 200, pfY = 500, pfW = 470, pfH = 220;
roundRect(pfX, pfY, pfW, pfH, 4, '#FFF', '#DDD', 1);
ctx.fillStyle = '#F5F5F5';
ctx.fillRect(pfX + 1, pfY + 1, pfW - 2, 36);
lbl('Pending Feedback', pfX + 16, pfY + 22, 12, '#333', 'left', true);
roundRect(pfX + pfW - 72, pfY + 10, 56, 18, 2, '#EEE', '#AAA', 1);
lbl('2 Due', pfX + pfW - 44, pfY + 19, 10, '#555', 'center', false);
hline(pfX, pfX + pfW, pfY + 36, '#DDD', 1);

// Column headers
lbl('Candidate',      pfX + 14,  pfY + 52, 10, '#555', 'left', true);
lbl('Position',       pfX + 130, pfY + 52, 10, '#555', 'left', true);
lbl('Interview Date', pfX + 280, pfY + 52, 10, '#555', 'left', true);
lbl('Action',         pfX + 390, pfY + 52, 10, '#555', 'left', true);
hline(pfX, pfX + pfW, pfY + 62, '#DDD', 1);

const pfRows = [
  { name: 'Alex Johnson', pos: 'Sr. Software Engineer', date: '24 Apr, 10:00 AM' },
  { name: 'Emma Wilson',  pos: 'DevOps Engineer',       date: '23 Apr, 02:00 PM' },
];
pfRows.forEach((r, i) => {
  const ry = pfY + 66 + i * 40;
  ctx.fillStyle = i % 2 === 0 ? '#FFF' : '#F8F8F8';
  ctx.fillRect(pfX + 1, ry, pfW - 2, 40);
  lbl(r.name, pfX + 14,  ry + 20, 10, '#333', 'left', false);
  lbl(r.pos,  pfX + 130, ry + 20, 10, '#333', 'left', false);
  lbl(r.date, pfX + 280, ry + 20, 10, '#333', 'left', false);
  roundRect(pfX + 388, ry + 10, 70, 20, 2, '#EEE', '#888', 1);
  lbl('Submit Feedback', pfX + 423, ry + 20, 9, '#333', 'center', false);
});

// Overdue note
ctx.font = 'italic 10px Arial';
ctx.fillStyle = '#888';
ctx.textAlign = 'left';
ctx.textBaseline = 'middle';
ctx.fillText('\u26A0 Feedback overdue for Emma Wilson', pfX + 14, pfY + 150);

// ── 10. Question Bank Panel ───────────────────────────────────────────────────
const qbX = 682, qbY = 500, qbW = 498, qbH = 220;
roundRect(qbX, qbY, qbW, qbH, 4, '#FFF', '#DDD', 1);
ctx.fillStyle = '#F5F5F5';
ctx.fillRect(qbX + 1, qbY + 1, qbW - 2, 36);
lbl('Question Bank', qbX + 16, qbY + 22, 12, '#333', 'left', true);
lbl('View All \u2192', qbX + qbW - 16, qbY + 22, 10, '#777', 'right', false);
hline(qbX, qbX + qbW, qbY + 36, '#DDD', 1);

const qbRows = [
  { name: 'Software Engineering \u2013 Technical', qs: '24 Qs', diff: 'Hard'   },
  { name: 'UX Design \u2013 Portfolio Review',     qs: '18 Qs', diff: 'Medium' },
  { name: 'Sales \u2013 Competency Based',         qs: '20 Qs', diff: 'Medium' },
  { name: 'DevOps \u2013 System Design',           qs: '15 Qs', diff: 'Hard'   },
  { name: 'General \u2013 Behavioural',            qs: '12 Qs', diff: 'Easy'   },
];
qbRows.forEach((r, i) => {
  const ry = qbY + 40 + i * 32;
  ctx.fillStyle = i % 2 === 0 ? '#FFF' : '#F8F8F8';
  ctx.fillRect(qbX + 1, ry, qbW - 2, 32);
  lbl(r.name, qbX + 14,  ry + 16, 10, '#333', 'left', false);
  lbl(r.qs,   qbX + 260, ry + 16, 10, '#555', 'left', false);
  // Difficulty badge
  roundRect(qbX + 316, ry + 8, 44, 16, 2, '#EEE', '#CCC', 1);
  lbl(r.diff, qbX + 338, ry + 16, 9, '#555', 'center', false);
  // Use button
  roundRect(qbX + 450, ry + 7, 32, 18, 2, '#EEE', '#888', 1);
  lbl('Use', qbX + 466, ry + 16, 9, '#333', 'center', false);
});

// ── 11. Feedback History Summary ──────────────────────────────────────────────
const fhX = 200, fhY = 730, fhW = 980, fhH = 140;
roundRect(fhX, fhY, fhW, fhH, 4, '#FFF', '#DDD', 1);
ctx.fillStyle = '#F5F5F5';
ctx.fillRect(fhX + 1, fhY + 1, fhW - 2, 36);
lbl('Recent Feedback Submitted', fhX + 16, fhY + 22, 12, '#333', 'left', true);
lbl('View All History \u2192', fhX + fhW - 16, fhY + 22, 10, '#777', 'right', false);
hline(fhX, fhX + fhW, fhY + 36, '#DDD', 1);

// Column headers
const fhCols = [
  { text: 'Candidate',      x: fhX + 14  },
  { text: 'Position',       x: fhX + 160 },
  { text: 'Date',           x: fhX + 310 },
  { text: 'Technical',      x: fhX + 400 },
  { text: 'Communication',  x: fhX + 490 },
  { text: 'Overall',        x: fhX + 590 },
  { text: 'Recommendation', x: fhX + 660 },
];
fhCols.forEach(c => lbl(c.text, c.x, fhY + 52, 10, '#555', 'left', true));
hline(fhX, fhX + fhW, fhY + 62, '#DDD', 1);

const fhRows = [
  { name: 'James Lee',    pos: 'Sr. Engineer', date: '23 Apr', tech: '4.5/5', comm: '4.0/5', overall: '4.3/5', rec: 'Hire',    recFill: '#EEE', recStroke: '#888', recColor: '#333' },
  { name: 'Sophie Brown', pos: 'UX Designer',  date: '22 Apr', tech: '3.8/5', comm: '4.2/5', overall: '4.0/5', rec: 'Consider', recFill: '#F5F5F5', recStroke: '#AAA', recColor: '#888' },
];
fhRows.forEach((r, i) => {
  const ry = fhY + 66 + i * 32;
  ctx.fillStyle = i % 2 === 0 ? '#FFF' : '#F8F8F8';
  ctx.fillRect(fhX + 1, ry, fhW - 2, 32);
  lbl(r.name,    fhX + 14,  ry + 16, 10, '#333', 'left', false);
  lbl(r.pos,     fhX + 160, ry + 16, 10, '#333', 'left', false);
  lbl(r.date,    fhX + 310, ry + 16, 10, '#333', 'left', false);
  lbl(r.tech,    fhX + 400, ry + 16, 10, '#333', 'left', false);
  lbl(r.comm,    fhX + 490, ry + 16, 10, '#333', 'left', false);
  lbl(r.overall, fhX + 590, ry + 16, 10, '#333', 'left', false);
  const recW = r.rec === 'Hire' ? 36 : 58;
  roundRect(fhX + 658, ry + 8, recW, 16, 2, r.recFill, r.recStroke, 1);
  lbl(r.rec, fhX + 658 + recW / 2, ry + 16, 9, r.recColor, 'center', false);
});

// ── 12. Footer Bar ────────────────────────────────────────────────────────────
ctx.fillStyle = '#F5F5F5';
ctx.fillRect(190, 890, 1000, 24);
hline(190, 1190, 890, '#DDD', 1);
lbl('RMS v1.0.0  \u00B7  Interviewer Portal  \u00B7  Session expires in 1h 45m', 690, 902, 10, '#888', 'center', false);
</script>
</body>
</html>
