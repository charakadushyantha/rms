<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHPUnit Code Coverage Report — RMS Test Suite</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #CCCCCC;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    font-family: Arial, sans-serif;
  }
  #print-btn {
    margin-bottom: 12px;
    padding: 8px 20px;
    background: #1A6496;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    font-family: Arial, sans-serif;
  }
  #print-btn:hover { background: #145278; }
  canvas {
    display: block;
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  @media print {
    body { background: #fff; padding: 0; }
    #print-btn { display: none; }
    canvas { box-shadow: none; }
  }
</style>
</head>
<body>

<button id="print-btn" onclick="window.print()">📸 Print / Save as Image</button>
<canvas id="cvs" width="1200" height="900"></canvas>

<script>
(function(){
  const canvas = document.getElementById('cvs');
  const ctx = canvas.getContext('2d');

  /* ── helpers ─────────────────────────────────────────────────── */
  function roundRect(x,y,w,h,r,fill,stroke,lw){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
    if(fill){ctx.fillStyle=fill;ctx.fill();}
    if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1;ctx.stroke();}
  }

  function lbl(text,x,y,size,color,align,bold,italic){
    let f='';
    if(italic) f+='italic ';
    if(bold)   f+='bold ';
    f+=size+'px Arial';
    ctx.font=f;
    ctx.fillStyle=color;
    ctx.textAlign=align||'left';
    ctx.textBaseline='middle';
    ctx.fillText(text,x,y);
  }

  function hline(x1,x2,y,color,lw){
    ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);
    ctx.strokeStyle=color;ctx.lineWidth=lw||1;ctx.stroke();
  }

  function vline(x,y1,y2,color,lw){
    ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x,y2);
    ctx.strokeStyle=color;ctx.lineWidth=lw||1;ctx.stroke();
  }

  function progressBar(x,y,w,h,pct,fillColor,bgColor){
    ctx.fillStyle=bgColor||'#E0E0E0';
    ctx.fillRect(x,y,w,h);
    ctx.fillStyle=fillColor;
    ctx.fillRect(x,y,w*pct,h);
    ctx.strokeStyle='#CCCCCC';
    ctx.lineWidth=0.5;
    ctx.strokeRect(x,y,w,h);
  }

  function barColor(pct){
    if(pct>=0.90) return '#00A000';
    if(pct>=0.75) return '#FAA600';
    return '#CC0000';
  }

  function rowBg(pct){
    if(pct>=0.90) return '#DFFFDF';
    if(pct>=0.75) return '#FFFADF';
    return '#FFDFDF';
  }

  /* ── canvas fill ─────────────────────────────────────────────── */
  ctx.fillStyle='#FFFFFF';
  ctx.fillRect(0,0,1200,900);

  /* ── figure caption ──────────────────────────────────────────── */
  lbl('Figure 3.24: PHPUnit Code-Coverage Report',600,22,14,'#000000','center',true);
  hline(10,1190,32,'#CCCCCC',1);

  /* ── browser chrome ──────────────────────────────────────────── */
  // outer frame
  ctx.fillStyle='#F0F0F0';
  ctx.strokeStyle='#888888';
  ctx.lineWidth=1;
  ctx.fillRect(10,36,1180,854);
  ctx.strokeRect(10,36,1180,854);

  // browser bar
  ctx.fillStyle='#DDDDDD';
  ctx.fillRect(10,36,1180,28);
  hline(10,1190,64,'#AAAAAA',1);

  // traffic-light circles
  [25,42,59].forEach(cx=>{
    ctx.beginPath();ctx.arc(cx,50,6,0,Math.PI*2);
    ctx.fillStyle='#BBBBBB';ctx.fill();
  });

  // URL bar
  ctx.fillStyle='#FFFFFF';
  ctx.strokeStyle='#AAAAAA';
  ctx.lineWidth=1;
  ctx.fillRect(80,41,700,18);
  ctx.strokeRect(80,41,700,18);
  lbl('file:///coverage/index.html',88,50,10,'#555555','left');

  /* ── PHPUnit header bar ──────────────────────────────────────── */
  ctx.fillStyle='#3C3C3C';
  ctx.fillRect(10,64,1180,50);
  lbl('Code Coverage Report',30,89,16,'#FFFFFF','left',true);
  lbl('Generated by PHPUnit 9.5  ·  RMS Test Suite  ·  24 April 2026',1170,89,11,'#AAAAAA','right');

  /* ── summary stats row ───────────────────────────────────────── */
  ctx.fillStyle='#F8F8F8';
  ctx.fillRect(10,114,1180,70);
  hline(10,1190,184,'#CCCCCC',1);

  // helper: draw one summary box
  function summaryBox(bx,by,bw,bh,label,pctStr,pct,barFill,pctColor){
    // label
    lbl(label,bx+10,by+14,11,'#555555','left',true);
    // big percentage
    lbl(pctStr,bx+10,by+36,22,pctColor||'#1A6496','left',true);
    // progress bar
    progressBar(bx+120,by+20,130,14,pct,barFill,'#E0E0E0');
    // pct text on bar
    lbl(pctStr,bx+120+65,by+27,9,'#333333','center',true);
  }

  summaryBox(30, 124,260,50,'Lines',    '78.4%',0.784,'#FAA600','#1A6496');
  summaryBox(310,124,260,50,'Functions','82.1%',0.821,'#00A000','#1A6496');
  summaryBox(590,124,260,50,'Branches', '71.3%',0.713,'#CC0000','#1A6496');
  summaryBox(870,124,280,50,'Classes',  '65.2%',0.652,'#CC0000','#CC0000');

  /* ── main table ──────────────────────────────────────────────── */
  // column x positions (centres / starts)
  const COL = {
    nameX:   30,   // text start for packages
    nameXi:  50,   // text start for classes (indented)
    linesX:  380,  // line count centre
    lbarX:   430,  // line bar start
    lpctX:   545,  // line pct text
    funcX:   620,  // func count centre
    fbarX:   660,  // func bar start
    fpctX:   775,  // func pct text
    branchX: 855,  // branch count centre
    bbarX:   895,  // branch bar start
    bpctX:   1005, // branch pct text
  };
  const BAR_W = 100;
  const BAR_H = 10;

  // table header
  ctx.fillStyle='#E0E0E0';
  ctx.fillRect(10,184,1180,32);
  ctx.strokeStyle='#CCCCCC';ctx.lineWidth=1;
  ctx.strokeRect(10,184,1180,32);

  lbl('Package / Class',  30,  200,11,'#333333','left',  true);
  lbl('Lines',            380, 200,11,'#333333','center',true);
  lbl('Line Coverage',    490, 200,11,'#333333','center',true);
  lbl('Functions',        620, 200,11,'#333333','center',true);
  lbl('Function Coverage',720, 200,11,'#333333','center',true);
  lbl('Branches',         855, 200,11,'#333333','center',true);
  lbl('Branch Coverage',  960, 200,11,'#333333','center',true);

  // vertical dividers in header
  [350,450,590,750,840,980,1060].forEach(vx=>{
    vline(vx,184,216,'#CCCCCC',1);
  });

  /* ── row drawing helper ──────────────────────────────────────── */
  let rowY = 216;
  const ROW_H = 32;

  function drawRow(isPackage, name,
                   lCov, lTot, lPct,
                   fCov, fTot, fPct,
                   bCov, bTot, bPct,
                   forceBg){

    const bg = forceBg || (isPackage ? '#F0F0F0' : rowBg(lPct));
    const ry = rowY;

    // row background
    ctx.fillStyle=bg;
    ctx.fillRect(10,ry,1180,ROW_H);

    // name
    if(isPackage){
      lbl(name, COL.nameX, ry+ROW_H/2, 12, '#333333','left',true);
    } else {
      lbl(name, COL.nameXi, ry+ROW_H/2, 11, '#1A6496','left');
    }

    // lines count
    lbl(lCov+'/'+lTot, COL.linesX, ry+ROW_H/2, 10,'#333333','center');

    // line bar + pct
    progressBar(COL.lbarX, ry+(ROW_H-BAR_H)/2, BAR_W, BAR_H, lPct, barColor(lPct),'#E0E0E0');
    lbl((lPct*100).toFixed(1)+'%', COL.lpctX, ry+ROW_H/2, 10,'#333333','left');

    // func count
    lbl(fCov+'/'+fTot, COL.funcX, ry+ROW_H/2, 10,'#333333','center');

    // func bar + pct
    progressBar(COL.fbarX, ry+(ROW_H-BAR_H)/2, BAR_W, BAR_H, fPct, barColor(fPct),'#E0E0E0');
    lbl((fPct*100).toFixed(1)+'%', COL.fpctX, ry+ROW_H/2, 10,'#333333','left');

    // branch count
    lbl(bCov+'/'+bTot, COL.branchX, ry+ROW_H/2, 10,'#333333','center');

    // branch bar + pct
    progressBar(COL.bbarX, ry+(ROW_H-BAR_H)/2, BAR_W, BAR_H, bPct, barColor(bPct),'#E0E0E0');
    lbl((bPct*100).toFixed(1)+'%', COL.bpctX, ry+ROW_H/2, 10,'#333333','left');

    // bottom border
    hline(10,1190,ry+ROW_H,'#DDDDDD',0.5);

    // vertical dividers
    [350,450,590,750,840,980,1060].forEach(vx=>{
      vline(vx,ry,ry+ROW_H,'#DDDDDD',0.5);
    });

    rowY += ROW_H;
  }

  // ── Row data ──────────────────────────────────────────────────
  // Row 1 — PACKAGE: application/controllers
  drawRow(true,'application/controllers',
    312,398,0.784,  42,51,0.824,  89,124,0.718);

  // Row 2 — Login.php
  drawRow(false,'Login.php',
    68,72,0.944,  9,9,1.000,  22,24,0.917);

  // Row 3 — A_dashboard.php
  drawRow(false,'A_dashboard.php',
    84,102,0.824,  11,14,0.786,  18,26,0.692);

  // Row 4 — R_dashboard.php
  drawRow(false,'R_dashboard.php',
    76,94,0.809,  10,13,0.769,  21,30,0.700);

  // Row 5 — Interview.php
  drawRow(false,'Interview.php',
    48,78,0.615,  7,11,0.636,  14,28,0.500);

  // Row 6 — Bot.php
  drawRow(false,'Bot.php',
    36,52,0.692,  5,6,0.833,  14,16,0.875);

  // Row 7 — PACKAGE: application/models
  drawRow(true,'application/models',
    428,512,0.836,  68,78,0.872,  112,148,0.757);

  // Row 8 — Candidate_model.php
  drawRow(false,'Candidate_model.php',
    72,78,0.923,  12,12,1.000,  28,30,0.933);

  // Row 9 — Interview_model.php
  drawRow(false,'Interview_model.php',
    64,68,0.941,  10,10,1.000,  22,24,0.917);

  // Row 10 — Login_model.php
  drawRow(false,'Login_model.php',
    38,40,0.950,  6,6,1.000,  14,14,1.000);

  // Row 11 — Bot_model.php
  drawRow(false,'Bot_model.php',
    42,52,0.808,  8,10,0.800,  16,22,0.727);

  // Row 12 — Custom_reports_model.php
  drawRow(false,'Custom_reports_model.php',
    28,58,0.483,  4,8,0.500,  8,20,0.400);

  // Row 13 — PACKAGE: application/libraries
  drawRow(true,'application/libraries',
    186,248,0.750,  28,36,0.778,  52,78,0.667);

  // Row 14 — BotEngine.php
  drawRow(false,'BotEngine.php',
    68,88,0.773,  10,12,0.833,  18,28,0.643);

  // Row 15 — CvParser.php
  drawRow(false,'CvParser.php',
    52,84,0.619,  8,12,0.667,  14,28,0.500);

  // Row 16 — AIService.php
  drawRow(false,'AIService.php',
    42,46,0.913,  6,6,1.000,  16,18,0.889);

  // Row 17 — PACKAGE: application/helpers
  drawRow(true,'application/helpers',
    48,56,0.857,  12,14,0.857,  18,24,0.750);

  // ── TOTAL ROW ─────────────────────────────────────────────────
  const totalY = rowY;
  ctx.fillStyle='#3C3C3C';
  ctx.fillRect(10,totalY,1180,ROW_H);

  lbl('TOTAL', COL.nameX, totalY+ROW_H/2, 12,'#FFFFFF','left',true);

  // lines
  lbl('974/1214', COL.linesX, totalY+ROW_H/2, 10,'#FFFFFF','center');
  progressBar(COL.lbarX, totalY+(ROW_H-BAR_H)/2, BAR_W, BAR_H, 0.802,'#FAA600','#555555');
  lbl('80.2%', COL.lpctX, totalY+ROW_H/2, 10,'#FFFFFF','left');

  // functions
  lbl('150/179', COL.funcX, totalY+ROW_H/2, 10,'#FFFFFF','center');
  progressBar(COL.fbarX, totalY+(ROW_H-BAR_H)/2, BAR_W, BAR_H, 0.838,'#00A000','#555555');
  lbl('83.8%', COL.fpctX, totalY+ROW_H/2, 10,'#FFFFFF','left');

  // branches
  lbl('271/374', COL.branchX, totalY+ROW_H/2, 10,'#FFFFFF','center');
  progressBar(COL.bbarX, totalY+(ROW_H-BAR_H)/2, BAR_W, BAR_H, 0.725,'#CC0000','#555555');
  lbl('72.5%', COL.bpctX, totalY+ROW_H/2, 10,'#FFFFFF','left');

  // vertical dividers on total row
  [350,450,590,750,840,980,1060].forEach(vx=>{
    vline(vx,totalY,totalY+ROW_H,'#666666',0.5);
  });

  hline(10,1190,totalY+ROW_H,'#555555',1);

  /* ── outer table border ──────────────────────────────────────── */
  ctx.strokeStyle='#CCCCCC';ctx.lineWidth=1;
  ctx.strokeRect(10,184,1180,totalY+ROW_H-184);

  /* ── uncovered lines panel ───────────────────────────────────── */
  const panelY = totalY + ROW_H + 4;
  ctx.fillStyle='#FFF8DC';
  ctx.fillRect(10,panelY,1180,72);
  ctx.strokeStyle='#CCCCCC';ctx.lineWidth=1;
  ctx.strokeRect(10,panelY,1180,72);

  lbl('⚠  Uncovered Lines Flagged for Follow-up',
      30, panelY+14, 12,'#CC6600','left',true);

  lbl('Interview.php: lines 45–52 (token validation),  78–84 (score calculation),  102–108 (expiry check)',
      30, panelY+32, 10,'#555555','left');
  lbl('CvParser.php: lines 34–48 (PDF extraction),  88–102 (OCR fallback)',
      30, panelY+46, 10,'#555555','left');
  lbl('Custom_reports_model.php: lines 28–58 (all methods — no test coverage)',
      30, panelY+60, 10,'#555555','left');

  /* ── bottom browser chrome ───────────────────────────────────── */
  // status bar
  ctx.fillStyle='#E8E8E8';
  ctx.fillRect(10,870,1180,20);
  hline(10,1190,870,'#AAAAAA',1);
  lbl('Done',20,880,10,'#555555','left');
  lbl('phpunit/coverage  |  17 classes  |  1214 lines analysed',
      1180,880,10,'#888888','right');

})();
</script>
</body>
</html>
