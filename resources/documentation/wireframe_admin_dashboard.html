<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 3.13: Administrator Dashboard Layout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  canvas {
    display: block;
    border: 1px solid #ccc;
  }
  #printBtn {
    margin: 16px auto;
    display: block;
    padding: 10px 22px;
    font-size: 13px;
    font-family: Arial, sans-serif;
    background: #fff;
    border: 1.5px solid #555;
    border-radius: 4px;
    cursor: pointer;
    color: #222;
  }
  #printBtn:hover { background: #f0f0f0; }
  @media print {
    #printBtn { display: none !important; }
    body { padding: 0; }
    canvas { border: none; }
  }
</style>
</head>
<body>
<button id="printBtn" onclick="window.print()">📸 Print / Save as Image</button>
<canvas id="wf" width="1200" height="900"></canvas>
<script>
const canvas = document.getElementById('wf');
const ctx = canvas.getContext('2d');

// ── Helper Functions ──────────────────────────────────────────────────────────

function roundRect(x, y, w, h, r, fill, stroke, lw) {
  r = r || 0;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1; ctx.stroke(); }
}

function label(text, x, y, size, color, align, bold) {
  ctx.font = (bold ? 'bold ' : '') + size + 'px Arial';
  ctx.fillStyle = color || '#000';
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

function hline(x1, x2, y, color, lw) {
  ctx.beginPath();
  ctx.strokeStyle = color || '#CCC';
  ctx.lineWidth = lw || 1;
  ctx.moveTo(x1, y);
  ctx.lineTo(x2, y);
  ctx.stroke();
}

function progressBar(x, y, w, h, pct, fillColor) {
  ctx.fillStyle = '#EEE'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = fillColor || '#555'; ctx.fillRect(x, y, w * pct, h);
  ctx.strokeStyle = '#CCC'; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h);
}

// ── 1. White Background ───────────────────────────────────────────────────────
ctx.save();
ctx.fillStyle = '#FFF';
ctx.fillRect(0, 0, 1200, 900);
ctx.restore();

// ── 2. Figure Caption + Line ──────────────────────────────────────────────────
ctx.save();
label('Figure 3.13: Administrator Dashboard Layout', 600, 22, 14, '#000', 'center', true);
hline(10, 1190, 30, '#CCC', 1);
ctx.restore();

// ── 3. Browser Chrome ─────────────────────────────────────────────────────────
ctx.save();
// Outer frame
roundRect(10, 35, 1180, 855, 0, '#F0F0F0', '#888', 1);
// Browser bar
ctx.fillStyle = '#DDD';
ctx.fillRect(10, 35, 1180, 28);
ctx.strokeStyle = '#888'; ctx.lineWidth = 1;
ctx.strokeRect(10, 35, 1180, 28);
// Browser buttons
[25, 42, 59].forEach(bx => {
  ctx.beginPath();
  ctx.arc(bx, 49, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#BBB'; ctx.fill();
  ctx.strokeStyle = '#999'; ctx.lineWidth = 0.5; ctx.stroke();
});
// URL bar
roundRect(80, 40, 700, 18, 3, '#FFF', '#AAA', 1);
label('http://localhost/rms/A_dashboard', 88, 49, 10, '#555', 'left', false);
ctx.restore();

// ── 4. Top Navigation Bar ─────────────────────────────────────────────────────
ctx.save();
ctx.fillStyle = '#111';
ctx.fillRect(10, 63, 1180, 48);
// Logo
roundRect(20, 75, 120, 24, 3, '#333', null, 0);
label('RMS', 80, 87, 14, '#FFF', 'center', true);
// Nav items
const navItems = [
  { text: 'Dashboard', x: 200 },
  { text: 'Candidates', x: 290 },
  { text: 'Recruiters', x: 380 },
  { text: 'Interviews', x: 470 },
  { text: 'Reports', x: 555 },
  { text: 'Settings', x: 635 },
];
navItems.forEach(n => label(n.text, n.x, 91, 11, '#FFF', 'left', false));
// Avatar circle
ctx.beginPath();
ctx.arc(1150, 87, 14, 0, Math.PI * 2);
ctx.fillStyle = '#555'; ctx.fill();
label('AD', 1150, 87, 10, '#FFF', 'center', true);
ctx.restore();

// ── 5. Left Sidebar ───────────────────────────────────────────────────────────
ctx.save();
ctx.fillStyle = '#F8F8F8';
ctx.fillRect(10, 111, 180, 779);
// Right border only
ctx.beginPath();
ctx.strokeStyle = '#DDD'; ctx.lineWidth = 1;
ctx.moveTo(190, 111); ctx.lineTo(190, 890); ctx.stroke();

label('MAIN MENU', 25, 135, 9, '#888', 'left', false);

const menuItems = [
  { text: 'Dashboard',          y: 163, active: true },
  { text: 'User Management',    y: 201, active: false },
  { text: 'Candidate Pool',     y: 237, active: false },
  { text: 'Job Postings',       y: 273, active: false },
  { text: 'Interviews',         y: 309, active: false },
  { text: 'Reports & Analytics',y: 345, active: false },
  { text: 'Audit Logs',         y: 381, active: false },
  { text: 'System Settings',    y: 417, active: false },
];

menuItems.forEach(item => {
  if (item.active) {
    ctx.fillStyle = '#EEE';
    ctx.fillRect(10, item.y - 18, 180, 36);
    ctx.fillStyle = '#000';
    ctx.fillRect(10, item.y - 18, 3, 36);
    label(item.text, 30, item.y, 12, '#111', 'left', true);
  } else {
    label(item.text, 30, item.y, 12, '#555', 'left', false);
  }
});

hline(15, 185, 453, '#DDD', 1);
label('QUICK ACTIONS', 25, 468, 9, '#888', 'left', false);

const quickActions = [
  { text: '+ Add Recruiter',    y: 490 },
  { text: '+ Create Job',       y: 520 },
  { text: '+ Generate Report',  y: 550 },
];
quickActions.forEach(q => label(q.text, 30, q.y, 11, '#333', 'left', false));
ctx.restore();

// ── 6. Page Header ────────────────────────────────────────────────────────────
ctx.save();
label('Administrator Dashboard', 210, 145, 18, '#111', 'left', true);
label('Good Morning, Admin  ·  Friday, 24 April 2026', 210, 163, 11, '#777', 'left', false);
// Refresh button
roundRect(1080, 130, 80, 26, 3, '#FFF', '#888', 1);
label('\u21BB Refresh', 1120, 143, 11, '#555', 'center', false);
ctx.restore();

// ── 7. Metric Cards (Section 1) ───────────────────────────────────────────────
ctx.save();
const cards = [
  { x: 200, title: 'Total Candidates',     value: '2,450', sub: '\u2191 12% this month',  subColor: '#555' },
  { x: 440, title: 'Active Recruiters',    value: '18',    sub: '\u2191 2 new this week',  subColor: '#555' },
  { x: 680, title: 'Interviews Scheduled', value: '47',    sub: '\u2191 8 today',           subColor: '#555' },
  { x: 920, title: 'Pending Approvals',    value: '6',     sub: '\u26A0 Requires action',   subColor: '#888' },
];
cards.forEach(c => {
  roundRect(c.x, 180, 228, 80, 6, '#F8F8F8', '#DDD', 1);
  label(c.title, c.x + 114, 198, 10, '#777', 'center', false);
  label(c.value,  c.x + 114, 226, 22, '#111', 'center', true);
  label(c.sub,    c.x + 114, 244, 10, c.subColor, 'center', false);
});
ctx.restore();

// ── 8. Module Shortcuts Panel (Section 2 Left) ────────────────────────────────
ctx.save();
const mpX = 200, mpY = 275, mpW = 460, mpH = 255;
roundRect(mpX, mpY, mpW, mpH, 4, '#FFF', '#DDD', 1);
// Header
ctx.fillStyle = '#F5F5F5';
ctx.fillRect(mpX + 1, mpY + 1, mpW - 2, 36);
label('Module Shortcuts', mpX + 16, mpY + 22, 12, '#333', 'left', true);
hline(mpX, mpX + mpW, mpY + 36, '#DDD', 1);

const tiles = [
  '[ User Mgmt ]', '[ Job Posts ]', '[ Calendar ]',
  '[ Reports ]',   '[ AI Chatbot ]','[ Settings ]',
];
const tileW = 130, tileH = 70, tileGap = 10;
const tileStartX = mpX + 14, tileStartY = mpY + 50;
tiles.forEach((t, i) => {
  const col = i % 3, row = Math.floor(i / 3);
  const tx = tileStartX + col * (tileW + tileGap);
  const ty = tileStartY + row * (tileH + tileGap);
  roundRect(tx, ty, tileW, tileH, 4, '#F0F0F0', '#CCC', 1);
  label(t, tx + tileW / 2, ty + tileH / 2, 11, '#333', 'center', false);
});
ctx.restore();

// ── 9. User Approval Queue Panel (Section 2 Right) ────────────────────────────
ctx.save();
const uqX = 672, uqY = 275, uqW = 518, uqH = 255;
roundRect(uqX, uqY, uqW, uqH, 4, '#FFF', '#DDD', 1);
// Header
ctx.fillStyle = '#F5F5F5';
ctx.fillRect(uqX + 1, uqY + 1, uqW - 2, 36);
label('User Approval Queue', uqX + 16, uqY + 22, 12, '#333', 'left', true);
// Badge
roundRect(uqX + uqW - 88, uqY + 10, 72, 18, 3, '#EEE', '#AAA', 1);
label('6 Pending', uqX + uqW - 52, uqY + 19, 10, '#555', 'center', false);
hline(uqX, uqX + uqW, uqY + 36, '#DDD', 1);

// Column headers
const uqCols = [
  { text: 'Username',   x: uqX + 16 },
  { text: 'Role',       x: uqX + 160 },
  { text: 'Registered', x: uqX + 270 },
  { text: 'Action',     x: uqX + 390 },
];
uqCols.forEach(c => label(c.text, c.x, uqY + 52, 10, '#555', 'left', true));
hline(uqX, uqX + uqW, uqY + 62, '#DDD', 1);

const uqRows = [
  { user: 'john.recruiter', role: 'Recruiter',   date: '24 Apr 2026' },
  { user: 'sarah.hr',       role: 'Recruiter',   date: '23 Apr 2026' },
  { user: 'mike.int',       role: 'Interviewer', date: '23 Apr 2026' },
  { user: 'lisa.cand',      role: 'Candidate',   date: '22 Apr 2026' },
  { user: 'tom.rec',        role: 'Recruiter',   date: '22 Apr 2026' },
];
uqRows.forEach((r, i) => {
  const ry = uqY + 66 + i * 32;
  ctx.fillStyle = i % 2 === 0 ? '#FFF' : '#F8F8F8';
  ctx.fillRect(uqX + 1, ry, uqW - 2, 32);
  label(r.user, uqX + 16,  ry + 16, 10, '#333', 'left', false);
  label(r.role, uqX + 160, ry + 16, 10, '#333', 'left', false);
  label(r.date, uqX + 270, ry + 16, 10, '#333', 'left', false);
  // Approve button
  roundRect(uqX + 388, ry + 7, 52, 18, 2, '#EEE', '#888', 1);
  label('Approve', uqX + 414, ry + 16, 9, '#333', 'center', false);
  // Reject button
  roundRect(uqX + 446, ry + 7, 40, 18, 2, '#FFF', '#AAA', 1);
  label('Reject', uqX + 466, ry + 16, 9, '#888', 'center', false);
});
ctx.restore();

// ── 10. Audit Log Panel (Section 3 Left) ─────────────────────────────────────
ctx.save();
const alX = 200, alY = 540, alW = 620, alH = 240;
roundRect(alX, alY, alW, alH, 4, '#FFF', '#DDD', 1);
// Header
ctx.fillStyle = '#F5F5F5';
ctx.fillRect(alX + 1, alY + 1, alW - 2, 36);
label('Audit Log Summary', alX + 16, alY + 22, 12, '#333', 'left', true);
label('View All \u2192', alX + alW - 16, alY + 22, 10, '#777', 'right', false);
hline(alX, alX + alW, alY + 36, '#DDD', 1);

// Column headers
const alCols = [
  { text: 'Time',     x: alX + 14 },
  { text: 'User',     x: alX + 90 },
  { text: 'Action',   x: alX + 175 },
  { text: 'Resource', x: alX + 270 },
  { text: 'Status',   x: alX + 480 },
];
alCols.forEach(c => label(c.text, c.x, alY + 50, 10, '#555', 'left', true));
hline(alX, alX + alW, alY + 60, '#DDD', 1);

const alRows = [
  { time: '09:42:15', user: 'admin',   action: 'LOGIN',  resource: 'System',          status: 'success' },
  { time: '09:38:02', user: 'admin',   action: 'CREATE', resource: 'Job: Sr. Dev',    status: 'success' },
  { time: '09:31:44', user: 'john.r',  action: 'UPDATE', resource: 'Candidate #234',  status: 'success' },
  { time: '09:28:11', user: 'sarah.h', action: 'DELETE', resource: 'Draft Job #12',   status: 'success' },
  { time: '09:15:30', user: 'admin',   action: 'EXPORT', resource: 'Candidates CSV',  status: 'success' },
  { time: '08:55:22', user: 'mike.i',  action: 'LOGIN',  resource: 'System',          status: 'failed' },
];
alRows.forEach((r, i) => {
  const ry = alY + 64 + i * 28;
  ctx.fillStyle = i % 2 === 0 ? '#FFF' : '#F8F8F8';
  ctx.fillRect(alX + 1, ry, alW - 2, 28);
  label(r.time,     alX + 14,  ry + 14, 10, '#333', 'left', false);
  label(r.user,     alX + 90,  ry + 14, 10, '#333', 'left', false);
  label(r.action,   alX + 175, ry + 14, 10, '#333', 'left', false);
  label(r.resource, alX + 270, ry + 14, 10, '#333', 'left', false);
  if (r.status === 'success') {
    label('\u25CF success', alX + 480, ry + 14, 9, '#333', 'left', false);
  } else {
    label('\u25CB failed',  alX + 480, ry + 14, 9, '#888', 'left', false);
  }
});
ctx.restore();

// ── 11. System Health Panel (Section 3 Right) ─────────────────────────────────
ctx.save();
const shX = 832, shY = 540, shW = 358, shH = 240;
roundRect(shX, shY, shW, shH, 4, '#FFF', '#DDD', 1);
// Header
ctx.fillStyle = '#F5F5F5';
ctx.fillRect(shX + 1, shY + 1, shW - 2, 36);
label('System Health', shX + 16, shY + 22, 12, '#333', 'left', true);
hline(shX, shX + shW, shY + 36, '#DDD', 1);

const healthItems = [
  { label: 'Database',    pct: 0.85, fill: '#555', text: '85% — Healthy' },
  { label: 'Storage',     pct: 0.42, fill: '#888', text: '42% — Normal' },
  { label: 'Sessions',    pct: 0.23, fill: '#AAA', text: '23 Active' },
  { label: 'Email Queue', pct: 0.10, fill: '#CCC', text: '2 Pending' },
];
healthItems.forEach((h, i) => {
  const hy = shY + 46 + i * 38;
  label(h.label, shX + 14, hy + 10, 10, '#555', 'left', false);
  progressBar(shX + 14, hy + 18, shW - 100, 10, h.pct, h.fill);
  label(h.text, shX + shW - 80, hy + 23, 9, '#555', 'left', false);
});
// API Status
const apiY = shY + 46 + 4 * 38;
label('\u25CF All services operational', shX + 14, apiY + 10, 10, '#333', 'left', false);
ctx.restore();

// ── 12. Footer Bar ────────────────────────────────────────────────────────────
ctx.save();
ctx.fillStyle = '#F5F5F5';
ctx.fillRect(190, 870, 1000, 24);
hline(190, 1190, 870, '#DDD', 1);
label('RMS v1.0.0  ·  \u00A9 2026 LankanTech Solutions  ·  Last login: Today 08:30', 690, 882, 10, '#888', 'center', false);
ctx.restore();
</script>
</body>
</html>
